name: Hosted Validation

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - ready_for_review
      - synchronize
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosted-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-matrix:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    runs-on: ubuntu-24.04
    env:
      TELEMETRY_ENABLED: "false"
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: ubuntu-24-04
            label: Ubuntu 24.04
            base_image: ubuntu:24.04
          - id: ubuntu-22-04
            label: Ubuntu 22.04
            base_image: ubuntu:22.04
          - id: debian-12
            label: Debian 12
            base_image: debian:12
          - id: debian-13
            label: Debian 13
            base_image: debian:13

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required tools
        shell: bash
        run: |
          set -euo pipefail
          docker version

      - name: Run telemetry regressions
        shell: bash
        run: |
          set -euo pipefail
          make test-telemetry

      - name: Run containerized smoke for ${{ matrix.label }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p test-artifacts
          bash ./tests/test-in-docker.sh \
            --image-tag productive-k3s:test-${{ matrix.id }} \
            --base-image ${{ matrix.base_image }} \
            | tee test-artifacts/docker-smoke-${{ matrix.id }}.log

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-${{ matrix.id }}
          path: test-artifacts/docker-smoke-${{ matrix.id }}.log
          retention-days: 14

  hosted-full-ubuntu-24-04:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.pull_request.draft == false }}
    needs: smoke-matrix
    runs-on: ubuntu-24.04
    env:
      TELEMETRY_ENABLED: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required tools
        shell: bash
        run: |
          set -euo pipefail
          jq --version

      - name: Run telemetry regressions
        shell: bash
        run: |
          set -euo pipefail
          make test-telemetry

      - name: Run hosted validation
        shell: bash
        run: |
          set -euo pipefail
          bash ./tests/test-on-gh-hosted.sh

      - name: Verify hosted summary
        shell: bash
        run: |
          set -euo pipefail
          jq -e '.status == "success"' test-artifacts/hosted-validation-summary.json

      - name: Upload workflow artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hosted-full-ubuntu-24.04
          path: |
            test-artifacts/
            runs/
          retention-days: 14
