site_name: Productive K3S
site_description: Production-like Kubernetes on a single VM, with bilingual documentation.
site_author: Productive K3S
site_url: https://jemacchi.github.io/productive-k3s/
repo_url: https://github.com/jemacchi/productive-k3s
repo_name: GitHub
edit_uri: edit/main/docs/src/
docs_dir: src
site_dir: site

theme:
  name: material
  custom_dir: src/overrides
  language: en
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
  font: false
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - English:
      - Home: en/index.md
      - Product:
          - en/overview/index.md
          - How to use: en/overview/how-to-use.md
          - Reasons behind: en/overview/reasons-behind.md
          - Supported platforms: en/overview/supported-platforms.md
      - User docs:
          - en/reference/index.md
          - Checks:
              - K3s: en/reference/k3s-checks.md
              - Ingress: en/reference/ingress-checks.md
              - Rancher: en/reference/rancher-checks.md
              - Registry: en/reference/registry-checks.md
              - Longhorn: en/reference/longhorn-checks.md
              - Certificates: en/reference/certificate-checks.md
          - Longhorn single-node notes: en/reference/longhorn-single-node-notes.md
          - Privacy and telemetry: en/reference/privacy-and-telemetry.md
      - Contributor docs:
          - en/contributor/index.md
          - Guides:
              - en/guides/index.md
              - macOS development: en/guides/macos-development.md
              - Post-development testing: en/guides/post-development-testing.md
              - Windows development: en/guides/windows-development.md
          - GitHub Actions and releases: en/contributor/github-actions.md
          - Support baseline:
              - Ubuntu 22.04: en/contributor/ubuntu-22-04-supported.md
              - Ubuntu 24.04: en/contributor/ubuntu-24-04-supported.md
              - Debian 12: en/contributor/debian-12-supported.md
              - Debian 13: en/contributor/debian-13-supported.md
  - Español:
      - Inicio: es/index.md
      - Producto:
          - es/overview/index.md
          - Cómo usar: es/overview/how-to-use.md
          - Razones del diseño: es/overview/reasons-behind.md
          - Plataformas soportadas: es/overview/supported-platforms.md
      - Documentación para usuarios:
          - es/reference/index.md
          - Verificaciones:
              - K3s: es/reference/k3s-checks.md
              - Ingress: es/reference/ingress-checks.md
              - Rancher: es/reference/rancher-checks.md
              - Registry: es/reference/registry-checks.md
              - Longhorn: es/reference/longhorn-checks.md
              - Certificados: es/reference/certificate-checks.md
          - Notas de Longhorn para nodo único: es/reference/longhorn-single-node-notes.md
          - Privacidad y telemetría: es/reference/privacy-and-telemetry.md
      - Documentación para contribuidores:
          - es/contributor/index.md
          - Guías:
              - es/guides/index.md
              - Desarrollo en macOS: es/guides/macos-development.md
              - Pruebas después de cambios: es/guides/post-development-testing.md
              - Desarrollo en Windows: es/guides/windows-development.md
          - GitHub Actions y releases: es/contributor/github-actions.md
          - Baseline de soporte:
              - Ubuntu 22.04: es/contributor/ubuntu-22-04-supported.md
              - Ubuntu 24.04: es/contributor/ubuntu-24-04-supported.md
              - Debian 12: es/contributor/debian-12-supported.md
              - Debian 13: es/contributor/debian-13-supported.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jemacchi/productive-k3s
