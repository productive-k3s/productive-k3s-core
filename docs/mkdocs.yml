site_name: Productive K3S Core
site_description: Production-like Kubernetes on a single VM, with bilingual documentation.
site_author: Productive K3S Core
site_url: https://core.productive-k3s.io/
repo_url: https://github.com/jemacchi/productive-k3s-core
repo_name: GitHub
edit_uri: edit/main/docs/src/
docs_dir: src
site_dir: site

theme:
  name: material
  custom_dir: src/overrides
  language: en
  favicon: assets/images/favicon.ico
  features:
    - navigation.tabs
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.expand
    - navigation.footer
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: white
      accent: blue
  font: false
  icon:
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Home: index.md
  - English:
      - Home: en/index.md
      - Product:
          - en/product/index.md
          - How to use: en/product/how-to-use.md
          - Reasons behind: en/product/reasons-behind.md
          - Supported platforms: en/product/supported-platforms.md
          - Relationship with Productive K3S Infra: en/product/productive-k3s-infra-relationship.md
      - User docs:
          - en/user-docs/index.md
          - Host preflight: en/user-docs/host-preflight.md
          - Checks:
              - K3s: en/user-docs/k3s-checks.md
              - Ingress: en/user-docs/ingress-checks.md
              - Rancher: en/user-docs/rancher-checks.md
              - Registry: en/user-docs/registry-checks.md
              - Longhorn: en/user-docs/longhorn-checks.md
              - Certificates: en/user-docs/certificate-checks.md
          - Longhorn single-node notes: en/user-docs/longhorn-single-node-notes.md
          - Privacy and telemetry: en/user-docs/privacy-and-telemetry.md
      - Developer docs:
          - en/developer-docs/index.md
          - Make targets: en/developer-docs/make-targets.md
          - Productive K3S Core modes: en/developer-docs/productive-k3s-modes.md
          - Scripts parameters: en/developer-docs/script-parameters.md
          - Guides:
              - en/developer-docs/guides/index.md
              - macOS development: en/developer-docs/guides/macos-development.md
              - Post-development testing: en/developer-docs/guides/post-development-testing.md
              - Windows development: en/developer-docs/guides/windows-development.md
          - GitHub Actions and releases: en/developer-docs/github-actions.md
          - Support baseline:
              - Ubuntu 22.04: en/developer-docs/ubuntu-22-04-supported.md
              - Ubuntu 24.04: en/developer-docs/ubuntu-24-04-supported.md
              - Debian 12: en/developer-docs/debian-12-supported.md
              - Debian 13: en/developer-docs/debian-13-supported.md
  - Español:
      - Inicio: es/index.md
      - Producto:
          - es/product/index.md
          - Cómo usar: es/product/how-to-use.md
          - Razones del diseño: es/product/reasons-behind.md
          - Plataformas soportadas: es/product/supported-platforms.md
          - Relación con Productive K3S Infra: es/product/productive-k3s-infra-relationship.md
      - Documentación para usuarios:
          - es/user-docs/index.md
          - Preflight del host: es/user-docs/host-preflight.md
          - Verificaciones:
              - K3s: es/user-docs/k3s-checks.md
              - Ingress: es/user-docs/ingress-checks.md
              - Rancher: es/user-docs/rancher-checks.md
              - Registry: es/user-docs/registry-checks.md
              - Longhorn: es/user-docs/longhorn-checks.md
              - Certificados: es/user-docs/certificate-checks.md
          - Notas de Longhorn para nodo único: es/user-docs/longhorn-single-node-notes.md
          - Privacidad y telemetría: es/user-docs/privacy-and-telemetry.md
      - Documentación para desarrolladores:
          - es/developer-docs/index.md
          - Targets de Make: es/developer-docs/make-targets.md
          - Modos de Productive K3S Core: es/developer-docs/productive-k3s-modes.md
          - Parámetros de scripts: es/developer-docs/script-parameters.md
          - Guías:
              - es/developer-docs/guides/index.md
              - Desarrollo en macOS: es/developer-docs/guides/macos-development.md
              - Pruebas después de cambios: es/developer-docs/guides/post-development-testing.md
              - Desarrollo en Windows: es/developer-docs/guides/windows-development.md
          - GitHub Actions y releases: es/developer-docs/github-actions.md
          - Baseline de soporte:
              - Ubuntu 22.04: es/developer-docs/ubuntu-22-04-supported.md
              - Ubuntu 24.04: es/developer-docs/ubuntu-24-04-supported.md
              - Debian 12: es/developer-docs/debian-12-supported.md
              - Debian 13: es/developer-docs/debian-13-supported.md

extra:
  pk3s:
    footer_slogan_en: "Productive K3S: a simple way to run Kubernetes on a single VM, without the overhead of a full cluster."
    footer_slogan_es: "Productive K3S: una forma simple de ejecutar Kubernetes en una sola VM, sin la sobrecarga de un cluster completo."
    contact_label_en: "Contact"
    contact_label_es: "Contacto"
    contact_value: "contact@productive-k3s.io"
    newsletter_label_en: "Newsletter"
    newsletter_label_es: "Newsletter"
    newsletter_placeholder_en: "E-mail"
    newsletter_placeholder_es: "E-mail"
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jemacchi/productive-k3s-core
